# ANet VPN Server — Docker Compose
# Default: uses prebuilt binaries from GitHub releases (fast setup)
# To build from source instead: docker compose -f docker-compose.build.yml up -d
# Requires: Linux host, network_mode: host, NET_ADMIN capability

services:
  anet-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ANET_VERSION: latest  # Change to specific version like "1.0.0" if needed
        GITHUB_REPO: ZeroTworu/anet
    image: anet-server:latest
    container_name: anet-server
    # Host network so server can bind 0.0.0.0:8443 and use host's external_if for NAT
    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      # Mount config dir: put server.toml here (with quic_cert, quic_key, server_signing_key, allowed_clients)
      - ./server:/config:ro
    command: ["-c", "/config/server.toml"]
    restart: unless-stopped
